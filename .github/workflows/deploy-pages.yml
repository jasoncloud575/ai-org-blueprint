# Deploy the static landing page to GitHub Pages.
# 用 GitHub Actions 部署靜態 landing page 到 Pages(可在 Actions 分頁看建置進度)。
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # 允許手動觸發

permissions:
  contents: read
  pages: write
  id-token: write

# 同時只跑一個部署，取消進行中的舊的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site (repo root — contains index.html)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
